<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ФБР | СЕКРЕТНЫЕ МАТЕРИАЛЫ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Narrow', Arial, 'Helvetica Condensed', Helvetica, sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .fbi-terminal {
            max-width: 1200px;
            width: 100%;
            border: 2px solid #333;
            padding: 30px;
            background-color: #111;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
            position: relative;
        }

        .classified-header {
            border-bottom: 1px solid #ff0000;
            margin-bottom: 25px;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            font-weight: bold;
            color: #ff5e5e;
            letter-spacing: 3px;
            font-size: 14px;
        }

        .classified-header .left {
            background-color: #ff0000;
            color: black;
            padding: 5px 15px;
            font-size: 20px;
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
        }

        .fbi-seal {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .fbi-seal h1 {
            font-size: 70px;
            letter-spacing: 10px;
            color: white;
            text-shadow: 0 0 10px rgba(0, 153, 255, 0.5);
            font-weight: 900;
            line-height: 1;
        }

        .fbi-seal p {
            font-size: 16px;
            letter-spacing: 5px;
            word-spacing: 10px;
            color: #aaa;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            padding: 8px 0;
            margin: 8px auto;
            width: 80%;
        }

        /* Навигация */
        .case-nav {
            display: flex;
            border-bottom: 2px solid #222;
            margin-bottom: 30px;
            gap: 5px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 12px 25px;
            background-color: #1a1a1a;
            color: #aaa;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid #2a2a2a;
            border-bottom: none;
            transition: 0.2s;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px 5px 0 0;
        }

        .nav-btn.active {
            background-color: #222;
            color: #ffcccc;
            border-color: #8b0000;
            border-bottom: 2px solid #8b0000;
            margin-bottom: -2px;
        }

        .nav-btn:hover:not(.active) {
            background-color: #2a2a2a;
            color: white;
        }

        /* Кнопка тревоги */
        .alert-button-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .alert-nav-btn {
            padding: 10px 30px;
            background-color: #330000;
            color: #ff5555;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            border: 2px solid #ff0000;
            transition: 0.2s;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            animation: alertPulse 2s infinite;
        }

        .alert-nav-btn:hover {
            background-color: #ff0000;
            color: white;
        }

        @keyframes alertPulse {
            0% { box-shadow: 0 0 10px #ff0000; }
            50% { box-shadow: 0 0 30px #ff0000; }
            100% { box-shadow: 0 0 10px #ff0000; }
        }

        /* Страницы */
        .page {
            display: none;
        }

        .page.active-page {
            display: block;
        }

        /* Сетка для главной */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .case-file {
            background-color: #0d0d0d;
            border-left: 5px solid #8b0000;
            padding: 20px;
            border-radius: 0 8px 8px 0;
            box-shadow: inset 0 0 10px #000;
        }

        .case-file h2 {
            font-size: 28px;
            color: white;
            margin-bottom: 10px;
            border-bottom: 1px dashed #444;
            padding-bottom: 5px;
        }

        .case-meta {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 8px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .case-meta .label {
            color: #8b8b8b;
            text-transform: uppercase;
            font-weight: bold;
        }
        .case-meta .value {
            color: white;
            font-family: 'Courier New', monospace;
        }

        .active-orders {
            background-color: #050505;
            border: 1px solid #330000;
            padding: 20px;
        }

        .active-orders h3 {
            color: #ff4d4d;
            margin-bottom: 20px;
            font-size: 22px;
            text-transform: uppercase;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 18px;
        }
        .order-item .status {
            color: #ffaa00;
            font-weight: bold;
        }
        .order-item .status.hot {
            color: #ff0000;
        }

        /* Розыск */
        .wanted-list {
            background: #0a0a0a;
            padding: 20px;
        }

        .wanted-item {
            display: grid;
            grid-template-columns: 80px 1fr auto;
            gap: 20px;
            padding: 15px;
            border-bottom: 1px solid #333;
            align-items: center;
        }

        .wanted-photo {
            width: 60px;
            height: 60px;
            background: #1a1a1a;
            border: 2px solid #8b0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .wanted-name {
            font-size: 20px;
            color: white;
        }

        .wanted-reward {
            color: #ffaa00;
            font-weight: bold;
            font-size: 18px;
        }

        /* Агенты */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .agent-card {
            background: #0a0a0a;
            border: 1px solid #333;
            padding: 20px;
            text-align: center;
            border-top: 3px solid #8b0000;
            cursor: pointer;
            transition: 0.2s;
        }

        .agent-card:hover {
            transform: scale(1.02);
            border-color: #ff0000;
        }

        .agent-card .photo {
            width: 100px;
            height: 100px;
            background: #1a1a1a;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 2px solid #8b0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .agent-card .rank {
            color: #8b8b8b;
            font-size: 14px;
            text-transform: uppercase;
        }

        .agent-card .status {
            margin-top: 10px;
            padding: 5px;
            background: #1a1a1a;
            color: #0f0;
            font-size: 12px;
        }

        /* Модальное окно для агентов */
        .agent-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .agent-modal.active {
            display: flex;
        }

        .agent-bio {
            background: #111;
            border: 3px solid #8b0000;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
        }

        .agent-bio h2 {
            color: #ff5e5e;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .agent-bio p {
            margin: 10px 0;
            color: #ccc;
            line-height: 1.5;
        }

        .agent-bio button {
            margin-top: 20px;
            padding: 10px 25px;
            background: #8b0000;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* Архив */
        .archive-list {
            background: #0a0a0a;
            padding: 20px;
        }

        .archive-item {
            padding: 15px;
            background: #111;
            border-left: 5px solid #ffaa00;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .archive-item:hover {
            background: #1a1a1a;
            border-left-color: #ff0000;
        }

        .archive-item h3 {
            color: white;
            font-size: 20px;
            margin-bottom: 5px;
        }

        /* Модальное окно для архива */
        .archive-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .archive-modal.active {
            display: flex;
        }

        .archive-detail {
            background: #111;
            border: 3px solid #ffaa00;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .archive-detail h2 {
            color: #ffaa00;
            margin-bottom: 20px;
        }

        .archive-detail p {
            margin: 10px 0;
            color: #ccc;
        }

        .archive-detail button {
            margin-top: 20px;
            padding: 10px 25px;
            background: #8b0000;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* Терроризм */
        .terror-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .terror-card {
            background: #0a0a0a;
            border: 1px solid #333;
            border-left: 5px solid #ff0000;
            padding: 20px;
        }

        .terror-card h3 {
            color: #ff5e5e;
            margin-bottom: 15px;
        }

        /* SWAT */
        .swat-panel {
            background: #0a0a0a;
            border: 2px solid #ffaa00;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
        }

        .swat-button {
            background: #ff0000;
            color: white;
            font-size: 32px;
            font-weight: bold;
            padding: 30px;
            border: none;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 5px;
            animation: pulse 1.5s infinite;
            margin: 20px 0;
            border-radius: 5px;
        }

        @keyframes pulse {
            0% { background-color: #ff0000; box-shadow: 0 0 20px #ff0000; }
            50% { background-color: #8b0000; box-shadow: 0 0 50px #ff0000; }
            100% { background-color: #ff0000; box-shadow: 0 0 20px #ff0000; }
        }

        /* Разведка */
        .intel-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .intel-card {
            background: #0a0a0a;
            border: 1px solid #00ff00;
            padding: 20px;
        }

        .intel-card h3 {
            color: #00ff00;
            margin-bottom: 10px;
        }

        /* ===== ЗАСЕКРЕЧЕНО ===== */
        .classified-container {
            margin-bottom: 30px;
        }

        .classified-header-large {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #8b0000;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .classified-header-large h2 {
            color: white;
            font-size: 36px;
            letter-spacing: 3px;
        }

        .classified-header-large .stamp {
            color: #ff0000;
            font-size: 24px;
            opacity: 0.5;
            transform: rotate(-5deg);
            border: 3px solid #ff0000;
            padding: 5px 20px;
            font-weight: bold;
        }

        .classified-tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            border-bottom: 2px solid #8b0000;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }

        .classified-tab {
            padding: 12px 25px;
            background-color: #1a1a1a;
            color: #aaa;
            border: 1px solid #333;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            transition: 0.2s;
            border-radius: 5px 5px 0 0;
        }

        .classified-tab.active {
            background-color: #8b0000;
            color: white;
            border-color: #ff0000;
        }

        .classified-content {
            display: none;
            background: #0a0a0a;
            border: 1px solid #333;
            padding: 30px;
        }

        .classified-content.active {
            display: block;
        }

        .malasa-dossier {
            background: #0a0a0a;
            border: 3px solid #8b0000;
            padding: 30px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }

        .malasa-photo {
            border: 3px solid #ff0000;
            padding: 10px;
            background: #000;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: #333;
        }

        .malasa-info {
            padding: 20px;
            background: #111;
            border-left: 5px solid #8b0000;
        }

        .malasa-info h2 {
            color: white;
            font-size: 36px;
            margin-bottom: 20px;
            border-bottom: 2px solid #8b0000;
        }

        .field {
            margin-bottom: 15px;
        }

        .field .label {
            color: #8b8b8b;
            font-size: 14px;
            text-transform: uppercase;
        }

        .field .value {
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .project-shield {
            background: #0a0a0a;
            border: 3px solid #0066cc;
            padding: 30px;
        }

        .project-milstein {
            background: #0a0a0a;
            border: 3px solid #8b008b;
            padding: 30px;
        }

        /* Тревога */
        .alert-page {
            background: #1a0000;
            padding: 30px;
            text-align: center;
            border: 3px solid #ff0000;
            animation: pulse 1s infinite;
            margin-bottom: 30px;
        }

        /* Лента */
        .live-feed {
            background: #000;
            padding: 15px;
            font-family: 'Courier New', monospace;
            border: 1px solid #3a3a3a;
            color: #0f0;
            font-size: 14px;
            max-height: 150px;
            overflow-y: scroll;
            margin: 20px 0;
        }

        .live-feed p {
            margin: 5px 0;
            border-bottom: 1px dotted #1a4d1a;
            padding-bottom: 3px;
        }

        /* Нижние нашивки */
        .badges {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            border-top: 1px solid #222;
            padding-top: 20px;
            justify-content: center;
        }

        .badge {
            background-color: #1a1a1a;
            color: #ccc;
            padding: 12px 25px;
            clip-path: polygon(10% 0%, 90% 0%, 100% 50%, 90% 100%, 10% 100%, 0% 50%);
            font-size: 14px;
            letter-spacing: 2px;
            border: 1px solid #3a3a3a;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }

        .badge:hover {
            background-color: #2a2a2a;
            color: white;
            border-color: #8b0000;
            transform: scale(1.05);
        }

        .footer-warning {
            text-align: center;
            margin-top: 30px;
            color: #4a4a4a;
            font-size: 12px;
            text-transform: uppercase;
            border-top: 1px solid #1a1a1a;
            padding-top: 20px;
        }

        .footer-warning span {
            color: #8b0000;
            font-weight: bold;
        }

        /* Модальное окно входа */
        .login-modal {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: #111;
            border: 3px solid #8b0000;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
        }

        .login-box h2 {
            color: #ff5e5e;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            border: 2px solid #333;
            color: white;
            font-size: 18px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
        }

        .login-box input:focus {
            outline: none;
            border-color: #8b0000;
        }

        .login-box button {
            background: #8b0000;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
        }

        .login-box button:hover {
            background: #ff0000;
        }

        .error-message {
            color: #ff5555;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Модальное окно пароля */
 <div id="passwordModal" class="password-modal">
        <div class="password-box">
            <h2 id="passwordTitle">🔐 ВВЕДИТЕ ПАРОЛЬ</h2>
            <input type="password" id="passwordInput" placeholder="ПАРОЛЬ ДОСТУПА" onkeypress="if(event.key==='Enter') checkPassword()">
            <div>
                <button onclick="checkPassword()">ВОЙТИ</button>
                <button class="close-btn" onclick="closePasswordModal()">ОТМЕНА</button>
            </div>
            <div id="passwordError" class="error-message">НЕВЕРНЫЙ ПАРОЛЬ!</div>
        </div>
    </div>

    <!-- Модальное окно агента -->
    <div id="agentModal" class="agent-modal">
        <div class="agent-bio" id="agentBioContent"></div>
    </div>

    <!-- Модальное окно архива -->
    <div id="archiveModal" class="archive-modal">
        <div class="archive-detail" id="archiveDetailContent"></div>
    </div>

    <script>
        // ПАРОЛИ
        const LOGIN_PASSWORD = "SFFBILOG565";        // Вход для гостя
        const FULL_ACCESS = "FBICLEAR2026";          // Полный доступ
        const AGENTS_PASSWORD = "FBIINFO2025";        // Агенты и розыск
        const ARCHIVE_PASSWORD = "ARCHFBI435";        // Архив
        const SWAT_PASSWORD = "SWATCALL294141";       // SWAT и тревога
        const MALAS_PASSWORD = "MALASA2026";          // Засекречено

        let fullAccess = false;
        let pendingPage = '';
        let pendingElement = null;

        // ВХОД
        function checkLogin() {
            const pwd = document.getElementById('loginPassword').value;
            
            if (pwd === FULL_ACCESS) {
                fullAccess = true;
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('page-active').classList.add('active-page');
            } 
            else if (pwd === LOGIN_PASSWORD) {
                fullAccess = false;
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('page-active').classList.add('active-page');
            } 
            else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        // ПРОВЕРКА ДОСТУПА
        function checkAccess(page, element) {
            if (fullAccess) {
                switchPage(page, element);
                return;
            }
            
            // Страницы без пароля
            if (page === 'active' || page === 'terror' || page === 'intel') {
                switchPage(page, element);
                return;
            }
            
            pendingPage = page;
            pendingElement = element;
            
            let title = '';
            if (page === 'wanted' || page === 'agents') title = 'ДОСТУП К РОЗЫСКУ И АГЕНТАМ';
            else if (page === 'archive') title = 'ДОСТУП К АРХИВУ';
            else if (page === 'swat' || page === 'alert') title = 'ДОСТУП К ВЫЗОВУ SWAT';
            else if (page === 'malas') title = 'ДОСТУП К ЗАСЕКРЕЧЕННОМУ ДОСЬЕ';
            
            document.getElementById('passwordTitle').innerText = '🔐 ' + title;
            document.getElementById('passwordModal').classList.add('active');
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordError').style.display = 'none';
        }

        // ПРОВЕРКА ПАРОЛЯ
        function checkPassword() {
            const pwd = document.getElementById('passwordInput').value;
            let required = '';
            
            if (pendingPage === 'wanted' || pendingPage === 'agents') required = AGENTS_PASSWORD;
            else if (pendingPage === 'archive') required = ARCHIVE_PASSWORD;
            else if (pendingPage === 'swat' || pendingPage === 'alert') required = SWAT_PASSWORD;
            else if (pendingPage === 'malas') required = MALAS_PASSWORD;
            
            if (pwd === required) {
                closePasswordModal();
                switchPage(pendingPage, pendingElement);
            } else {
                document.getElementById('passwordError').style.display = 'block';
            }
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').classList.remove('active');
        }

        // ПЕРЕКЛЮЧЕНИЕ СТРАНИЦ
        function switchPage(page, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById('page-' + page).classList.add('active-page');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if (element) element.classList.add('active');
            
            // Если открыли Засекречено, активируем первую вкладку
            if (page === 'malasa') {
                setTimeout(() => {
                    document.querySelectorAll('.classified-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.classified-content').forEach(c => c.classList.remove('active'));
                    
                    const firstTab = document.querySelector('.classified-tab');
                    const firstContent = document.getElementById('classified-malas');
                    
                    if (firstTab) firstTab.classList.add('active');
                    if (firstContent) firstContent.classList.add('active');
                }, 100);
            }
        }

        // ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК В ЗАСЕКРЕЧЕНО
        function switchClassifiedTab(tab, element) {
            document.querySelectorAll('.classified-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.classified-content').forEach(c => c.classList.remove('active'));
            
            element.classList.add('active');
            document.getElementById('classified-' + tab).classList.add('active');
        }

        // БИО АГЕНТОВ
        function showAgentBio(agent) {
            const modal = document.getElementById('agentModal');
            const content = document.getElementById('agentBioContent');
            
            let html = '';
            if (agent === 'fox') {
                html = '<h2>Special Agent Fox</h2><p>Настоящее имя: Майкл Фокс</p><p>Возраст: 42 года</p><p>Специализация: Полевые операции</p><p>15 лет в ФБР. Участвовал в 34 операциях.</p><button onclick="document.getElementById(\'agentModal\').classList.remove(\'active\')">ЗАКРЫТЬ</button>';
            } else if (agent === 'rains') {
                html = '<h2>Agent Rains</h2><p>Настоящее имя: Дэвид Рэйнс</p><p>Возраст: 35 лет</p><p>Специализация: Аналитика</p><p>8 лет в ФБР. Взломал 47 каналов связи.</p><button onclick="document.getElementById(\'agentModal\').classList.remove(\'active\')">ЗАКРЫТЬ</button>';
            } else if (agent === 'locke') {
                html = '<h2>Agent Locke</h2><p>Настоящее имя: Джонатан Локк</p><p>Возраст: 39 лет</p><p>Специализация: Координация</p><p>11 лет в ФБР. Координировал 56 операций.</p><button onclick="document.getElementById(\'agentModal\').classList.remove(\'active\')">ЗАКРЫТЬ</button>';
            }
            
            content.innerHTML = html;
            modal.classList.add('active');
        }

        // ДЕТАЛИ АРХИВА
        function showArchiveDetail(archive) {
            const modal = document.getElementById('archiveModal');
            const content = document.getElementById('archiveDetailContent');
            
            let html = '';
            if (archive === 'bank') {
                html = '<h2>🏦 FIRST WORLD BANK</h2><p>Дата: 12.03.2025</p><p>Участники: Даллас, Хокстон, Чейнс, Вулф</p><p>Ущерб: $8.2M</p><p>Статус: Расследуется</p><button onclick="document.getElementById(\'archiveModal\').classList.remove(\'active\')">ЗАКРЫТЬ</button>';
            } else if (archive === 'diamond') {
                html = '<h2>💎 БРИЛЛИАНТОВАЯ ШАХТА</h2><p>Дата: 27.02.2025</p><p>Участники: Даллас, Хокстон, Чейнс</p><p>Ущерб: $12.5M</p><p>Статус: Горячий след</p><button onclick="document.getElementById(\'archiveModal\').classList.remove(\'active\')">ЗАКРЫТЬ</button>';
            } else if (archive === 'national') {
                html = '<h2>🏛 ОГРАБЛЕНИЕ НАЦБАНКА</h2><p>Дата: 05.01.2025</p><p>Участники: Хокстон, Вулф</p><p>Ущерб: $5.7M</p><p>Статус: Холодное дело</p><button onclick="document.getElementById(\'archiveModal\').classList.remove(\'active\')">ЗАКРЫТЬ</button>';
            }
            
            content.innerHTML = html;
            modal.classList.add('active');
        }

        // Закрытие модалок по клику вне окна
        window.onclick = function(event) {
            if (event.target === document.getElementById('agentModal')) {
                document.getElementById('agentModal').classList.remove('active');
            }
            if (event.target === document.getElementById('archiveModal')) {
                document.getElementById('archiveModal').classList.remove('active');
            }
            if (event.target === document.getElementById('passwordModal')) {
                document.getElementById('passwordModal').classList.remove('active');
            }
        }
    </script>
